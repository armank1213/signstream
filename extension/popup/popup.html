<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SignStream</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 12px; width: 280px; }
      label { display: block; font-size: 12px; opacity: 0.8; margin-bottom: 6px; }
      input { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
      button.primary { background: #111827; color: white; border-color: #111827; }
      .status { margin-top: 10px; font-size: 12px; opacity: 0.85; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <label for="engineUrl">Engine WebSocket URL</label>
    <input id="engineUrl" placeholder="ws://127.0.0.1:8765" />

    <div class="row">
      <button id="startBtn" class="primary">Start</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div id="status" class="status">Loading…</div>

    <script src="popup.js"></script>
  </body>
</html>
