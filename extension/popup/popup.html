<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SignStream</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 12px; width: 280px; }
      label { display: block; font-size: 12px; opacity: 0.8; margin-bottom: 6px; }
      input { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
      select { width: 100%; box-sizing: border-box; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
      button.primary { background: #111827; color: white; border-color: #111827; }
      .status { margin-top: 10px; font-size: 12px; opacity: 0.85; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <label for="engineUrl">Engine WebSocket URL</label>
    <input id="engineUrl" placeholder="ws://127.0.0.1:8765" />

    <div style="height: 10px"></div>

    <label for="mode">Display mode</label>
    <select id="mode" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="sign+captions">Signs + captions (recommended)</option>
      <option value="sign-only">Signs only</option>
      <option value="captions-only">Captions only</option>
    </select>

    <div style="height: 10px"></div>

    <label for="signRenderMode">Sign rendering</label>
    <select id="signRenderMode" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="chips">Text chips (fast)</option>
      <option value="gestures">Gesture clips (requires assets)</option>
      <option value="avatar">3D avatar (VRM) (experimental)</option>
    </select>

    <div style="height: 10px"></div>

    <label for="bufferMs">Sync buffer (ms)</label>
    <input id="bufferMs" type="number" min="0" max="5000" step="100" placeholder="1500" />

    <div style="height: 10px"></div>

    <label for="overlayPosition">Overlay position</label>
    <select id="overlayPosition" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="right-middle">Right middle</option>
      <option value="bottom-right">Bottom right</option>
      <option value="bottom-left">Bottom left</option>
    </select>

    <div style="height: 10px"></div>

    <label for="overlayScale">Overlay size</label>
    <select id="overlayScale" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="1">Normal</option>
      <option value="1.15">Large</option>
      <option value="1.3">Extra large</option>
    </select>

    <div style="height: 10px"></div>

    <label for="simplificationLevel">Simplification</label>
    <select id="simplificationLevel" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="0">Off (raw words)</option>
      <option value="1">Medium (remove fillers)</option>
      <option value="2">High (remove fillers + extra)</option>
    </select>

    <div style="height: 10px"></div>

    <label for="vadEnabled">Performance (VAD)</label>
    <select id="vadEnabled" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="true">On (recommended)</option>
      <option value="false">Off</option>
    </select>

    <div style="height: 10px"></div>

    <label for="fingerspellUnknown">Unknown words</label>
    <select id="fingerspellUnknown" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;">
      <option value="true">Fingerspell (ASL-style)</option>
      <option value="false">Show as text</option>
    </select>

    <div class="row">
      <button id="startBtn" class="primary">Start</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div id="status" class="status">Loading…</div>

    <script src="popup.js"></script>
  </body>
</html>
