<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SignStream</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 12px;
        min-width: 320px;
        max-width: 10000px;
        max-height: 640px;
        overflow-y: auto;
        background: #0b1020;
        color: #e5e7eb;
      }
      label { display: block; font-size: 12px; opacity: 0.8; margin: 10px 0 6px; }
      input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #0f172a;
        color: #e5e7eb;
        font-size: 13px;
      }
      select { appearance: none; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      button {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #0f172a;
        color: #e5e7eb;
        cursor: pointer;
        font-size: 13px;
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      button.primary { background: #1f2937; color: #f9fafb; border-color: rgba(56, 189, 248, 0.6); }
      button.ghost { background: transparent; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .app-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
      .logo { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.4); }
      .title { font-size: 16px; font-weight: 700; }
      .subtitle { font-size: 12px; opacity: 0.7; margin-top: 2px; }
      .section { margin-top: 12px; padding: 12px; border-radius: 14px; border: 1px solid rgba(148, 163, 184, 0.15); background: #0f172a; }
      .section h3 { margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; opacity: 0.7; font-weight: 700; }
      .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; border: 1px solid rgba(34, 197, 94, 0.5); color: #bbf7d0; background: rgba(34, 197, 94, 0.15); }
      .pill[data-tone="error"] { border-color: rgba(248, 113, 113, 0.6); color: #fecaca; background: rgba(248, 113, 113, 0.2); }
      .pill[data-tone="idle"] { border-color: rgba(148, 163, 184, 0.4); color: #e2e8f0; background: rgba(148, 163, 184, 0.15); }
      .status-text { font-size: 12px; opacity: 0.85; }
      .error { color: #fecaca; }
      .toggle-group { display: flex; gap: 8px; margin-bottom: 8px; }
      .toggle-btn {
        flex: 1;
        border-radius: 999px;
        padding: 6px 10px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(148, 163, 184, 0.1);
        font-size: 12px;
      }
      .toggle-btn.active { border-color: rgba(56, 189, 248, 0.6); background: rgba(56, 189, 248, 0.2); color: #e0f2fe; }
      .helper-text { font-size: 12px; opacity: 0.7; margin-bottom: 8px; }
      .site-current { font-size: 12px; padding: 8px 10px; background: rgba(148, 163, 184, 0.12); border-radius: 10px; word-break: break-all; }
      .site-current.allowed { background: rgba(34, 197, 94, 0.16); color: #bbf7d0; }
      .site-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; max-height: 110px; overflow-y: auto; }
      .site-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; font-size: 12px; background: rgba(148, 163, 184, 0.08); border-radius: 8px; }
      .site-row .host { word-break: break-all; }
      .site-row .badge { font-size: 10px; opacity: 0.6; margin-left: 6px; }
      .site-row .remove { flex: 0 0 auto; padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(148, 163, 184, 0.3); background: transparent; color: inherit; cursor: pointer; font-size: 12px; line-height: 1; }
      .site-row .remove:disabled { opacity: 0.4; cursor: not-allowed; }
      details.section { padding: 0; }
      details.section summary { cursor: pointer; list-style: none; padding: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; opacity: 0.8; }
      details.section summary::-webkit-details-marker { display: none; }
      details.section .section-body { padding: 0 12px 12px; }
    </style>
  </head>
  <body>
    <div class="app-header">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="13" stroke="#38BDF8" stroke-width="2" />
          <path d="M7.5 18.5c3-3.6 6-3.6 9 0s6 3.6 9 0" stroke="#22C55E" stroke-width="2" stroke-linecap="round" />
          <circle cx="16" cy="11" r="2" fill="#E2E8F0" />
        </svg>
      </div>
      <div>
        <div class="title">SignStream</div>
        <div class="subtitle">Realtime captions + signs</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>Status + quick actions</h3>
        <span id="statusPill" class="pill" data-tone="idle">Idle</span>
      </div>
      <div id="status" class="status-text">Loading…</div>
      <div class="row">
        <button id="startBtn" class="primary">Start</button>
        <button id="stopBtn">Stop</button>
      </div>
      <label>Site access</label>
      <div id="currentSite" class="site-current">Checking active tab…</div>
      <div class="row">
        <button id="addSiteBtn" class="ghost">Add this site</button>
      </div>
      <div id="siteList" class="site-list"></div>
    </div>

    <div class="section">
      <h3>Display</h3>
      <div class="toggle-group">
        <button id="toggleCaptions" class="toggle-btn" type="button" aria-pressed="true">Captions</button>
        <button id="toggleSigns" class="toggle-btn" type="button" aria-pressed="true">Signs</button>
      </div>
      <div id="modeHint" class="helper-text">Showing captions + signs.</div>
      <label for="signRenderMode">Sign rendering</label>
      <select id="signRenderMode">
        <option value="chips">Text chips (fast)</option>
        <option value="gestures">Gesture clips (requires assets)</option>
      </select>
      <label for="overlayPosition">Overlay position</label>
      <select id="overlayPosition">
        <option value="right-middle">Right middle</option>
        <option value="bottom-right">Bottom right</option>
        <option value="bottom-left">Bottom left</option>
      </select>
    </div>

    <div class="section">
      <h3>Language + processing</h3>
      <label for="simplificationLevel">Simplification</label>
      <select id="simplificationLevel">
        <option value="0">Off (raw words)</option>
        <option value="1">Medium (remove fillers)</option>
        <option value="2">High (remove fillers + extra)</option>
      </select>
    </div>

    <details class="section">
      <summary>Advanced</summary>
      <div class="section-body">
        <label for="engineUrl">Engine WebSocket URL</label>
        <input id="engineUrl" placeholder="ws://127.0.0.1:4000" />
        <label for="bufferMs">Sync buffer (ms)</label>
        <input id="bufferMs" type="number" min="0" max="5000" step="100" placeholder="1500" />
        <label for="vadEnabled">Performance (VAD)</label>
        <select id="vadEnabled">
          <option value="true">On (recommended)</option>
          <option value="false">Off</option>
        </select>
        <label for="fingerspellUnknown">Unknown words</label>
        <select id="fingerspellUnknown">
          <option value="true">Fingerspell (ASL-style)</option>
          <option value="false">Show as text</option>
        </select>
      </div>
    </details>

    <script src="popup.js"></script>
  </body>
</html>
